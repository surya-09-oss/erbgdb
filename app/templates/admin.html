<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Fantasy API - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            color: #111;
            line-height: 1.6;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 24px; }
        header {
            background: #111;
            color: #fff;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        header p { color: #aaa; margin-top: 4px; }

        .auth-section {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .auth-section h2 { font-size: 1.1rem; margin-bottom: 12px; }
        .auth-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .auth-row input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .auth-status {
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 4px 0;
        }
        .auth-status.valid { color: #0a7; }
        .auth-status.invalid { color: #c00; }

        .panel {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .panel h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
        }
        .form-group input, .form-group select {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #111;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 20px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-danger { background: #c00; color: #fff; }
        .btn-danger:hover { background: #a00; }
        .btn-group { display: flex; gap: 12px; margin-top: 16px; }

        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }
        .result.success { background: #e6f9e6; border: 1px solid #0a7; color: #064; display: block; }
        .result.error { background: #fde8e8; border: 1px solid #c00; color: #800; display: block; }

        .player-list {
            margin-top: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .player-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        .player-card:hover { background: #fafafa; }
        .player-card img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #eee;
        }
        .player-info { flex: 1; }
        .player-info .name { font-weight: 600; font-size: 0.95rem; }
        .player-info .meta { font-size: 0.8rem; color: #666; }
        .player-card .remove-btn {
            background: none;
            border: 1px solid #c00;
            color: #c00;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .player-card .remove-btn:hover { background: #c00; color: #fff; }

        .team-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .team-btn {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .team-btn.active { background: #111; color: #fff; border-color: #111; }
        .team-btn:hover { border-color: #111; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .auth-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Panel</h1>
            <p>IPL 2026 Fantasy API - Player Management</p>
        </header>

        <!-- Auth Section -->
        <div class="auth-section">
            <h2>Authentication</h2>
            <div class="auth-row">
                <input type="password" id="adminToken" placeholder="Enter admin token">
                <button class="btn btn-primary" onclick="verifyToken()">Verify</button>
            </div>
            <div id="authStatus" class="auth-status"></div>
        </div>

        <!-- Add Player -->
        <div class="panel">
            <h2>Add Player</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Player Name</label>
                    <input type="text" id="addName" placeholder="e.g. Virat Kohli">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="addRole">
                        <option value="Batsman">Batsman</option>
                        <option value="Bowler">Bowler</option>
                        <option value="All Rounder">All Rounder</option>
                        <option value="Wicket Keeper">Wicket Keeper</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Team</label>
                    <select id="addTeam">
                        <option value="csk">CSK - Chennai Super Kings</option>
                        <option value="dc">DC - Delhi Capitals</option>
                        <option value="gt">GT - Gujarat Titans</option>
                        <option value="kkr">KKR - Kolkata Knight Riders</option>
                        <option value="lsg">LSG - Lucknow Super Giants</option>
                        <option value="mi">MI - Mumbai Indians</option>
                        <option value="pk">PK - Punjab Kings</option>
                        <option value="rcb">RCB - Royal Challengers Bengaluru</option>
                        <option value="rr">RR - Rajasthan Royals</option>
                        <option value="srh">SRH - Sunrisers Hyderabad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Base Price (Cr)</label>
                    <input type="number" id="addBasePrice" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Sold Price (Cr)</label>
                    <input type="number" id="addSoldPrice" step="0.01" placeholder="0.00">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="addOverseas">
                    <label for="addOverseas" style="text-transform:none;font-size:0.95rem;color:#111;">Overseas Player</label>
                </div>
                <div class="form-group full">
                    <label>Player Image URL (optional)</label>
                    <input type="text" id="addImageUrl" placeholder="https://...">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addPlayer()">Add Player</button>
            </div>
            <div id="addResult" class="result"></div>
        </div>

        <!-- View & Remove Players -->
        <div class="panel">
            <h2>View & Remove Players</h2>
            <div class="team-selector" id="teamSelector"></div>
            <div id="playerList" class="player-list">
                <p style="color:#888;text-align:center;padding:20px;">Select a team above to view players</p>
            </div>
            <div id="removeResult" class="result"></div>
        </div>
    </div>

    <script>
        const BASE = '{{ base_url }}';
        const TEAMS = {
            csk: 'Chennai Super Kings', dc: 'Delhi Capitals', gt: 'Gujarat Titans',
            kkr: 'Kolkata Knight Riders', lsg: 'Lucknow Super Giants', mi: 'Mumbai Indians',
            pk: 'Punjab Kings', rcb: 'Royal Challengers Bengaluru', rr: 'Rajasthan Royals',
            srh: 'Sunrisers Hyderabad'
        };
        let currentTeam = null;

        function getToken() { return document.getElementById('adminToken').value.trim(); }

        async function verifyToken() {
            const token = getToken();
            const el = document.getElementById('authStatus');
            if (!token) { el.textContent = 'Please enter a token'; el.className = 'auth-status invalid'; return; }
            try {
                const r = await fetch(BASE + '/api/admin/token', { headers: { 'Authorization': 'Bearer ' + token } });
                const d = await r.json();
                if (r.ok && d.status === 'success') {
                    el.textContent = 'Token verified successfully';
                    el.className = 'auth-status valid';
                } else {
                    el.textContent = 'Invalid token: ' + (d.detail || d.error || 'Unknown error');
                    el.className = 'auth-status invalid';
                }
            } catch (e) {
                el.textContent = 'Error: ' + e.message;
                el.className = 'auth-status invalid';
            }
        }

        async function addPlayer() {
            const el = document.getElementById('addResult');
            const token = getToken();
            if (!token) { el.textContent = 'Please enter admin token first'; el.className = 'result error'; return; }

            const name = document.getElementById('addName').value.trim();
            if (!name) { el.textContent = 'Player name is required'; el.className = 'result error'; return; }

            const body = {
                name: name,
                role: document.getElementById('addRole').value,
                team: document.getElementById('addTeam').value,
                base_price_cr: parseFloat(document.getElementById('addBasePrice').value) || null,
                sold_price_cr: parseFloat(document.getElementById('addSoldPrice').value) || null,
                overseas: document.getElementById('addOverseas').checked,
                image_url: document.getElementById('addImageUrl').value.trim() || null,
            };

            try {
                const r = await fetch(BASE + '/api/admin/players/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(body),
                });
                const d = await r.json();
                if (d.status === 'success') {
                    el.textContent = d.message;
                    el.className = 'result success';
                    document.getElementById('addName').value = '';
                    if (currentTeam === body.team) loadTeamPlayers(currentTeam);
                } else {
                    el.textContent = d.error || d.detail || 'Failed to add player';
                    el.className = 'result error';
                }
            } catch (e) {
                el.textContent = 'Error: ' + e.message;
                el.className = 'result error';
            }
        }

        async function removePlayer(name, team) {
            const el = document.getElementById('removeResult');
            const token = getToken();
            if (!token) { el.textContent = 'Please enter admin token first'; el.className = 'result error'; return; }
            if (!confirm('Remove ' + name + ' from ' + team.toUpperCase() + '?')) return;

            try {
                const r = await fetch(BASE + '/api/admin/players/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ name: name, team: team }),
                });
                const d = await r.json();
                if (d.status === 'success') {
                    el.textContent = d.message;
                    el.className = 'result success';
                    loadTeamPlayers(team);
                } else {
                    el.textContent = d.error || d.detail || 'Failed to remove player';
                    el.className = 'result error';
                }
            } catch (e) {
                el.textContent = 'Error: ' + e.message;
                el.className = 'result error';
            }
        }

        async function loadTeamPlayers(team) {
            currentTeam = team;
            document.querySelectorAll('.team-btn').forEach(b => b.classList.toggle('active', b.dataset.team === team));
            const el = document.getElementById('playerList');
            el.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Loading...</p>';

            try {
                const r = await fetch(BASE + '/api/fantasy/players/' + team);
                const d = await r.json();
                if (d.players && d.players.length > 0) {
                    el.innerHTML = d.players.map(p => `
                        <div class="player-card">
                            <img src="${p.image_url || 'https://wassets.hscicdn.com/static/images/player-jersey.svg'}" alt="${p.name}" onerror="this.src='https://wassets.hscicdn.com/static/images/player-jersey.svg'">
                            <div class="player-info">
                                <div class="name">${p.name}</div>
                                <div class="meta">${p.role} ${p.overseas ? '(Overseas)' : ''} ${p.sold_price_cr ? '| ' + p.sold_price_cr + ' Cr' : ''}</div>
                            </div>
                            <button class="remove-btn" onclick="removePlayer('${p.name.replace(/'/g, "\\'")}', '${team}')">Remove</button>
                        </div>
                    `).join('');
                } else {
                    el.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">No players found for this team</p>';
                }
            } catch (e) {
                el.innerHTML = '<p style="color:#c00;text-align:center;padding:20px;">Error: ' + e.message + '</p>';
            }
        }

        // Build team selector buttons
        const sel = document.getElementById('teamSelector');
        Object.entries(TEAMS).forEach(([code, name]) => {
            const btn = document.createElement('button');
            btn.className = 'team-btn';
            btn.dataset.team = code;
            btn.textContent = code.toUpperCase();
            btn.title = name;
            btn.onclick = () => loadTeamPlayers(code);
            sel.appendChild(btn);
        });
    </script>
</body>
</html>
